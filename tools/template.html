<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>{{title}}</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1f2328;
    --fg-muted: #59636e;
    --bg: #ffffff;
    --bg-soft: #f6f8fa;
    --border: #d0d7de;
    --link: #0969da;
    --code-bg: #f6f8fa;
    --code-border: #d0d7de;
    --quote-border: #d0d7de;
    --user-accent: #0969da;
    --assistant-accent: #8250df;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #e6edf3;
      --fg-muted: #9198a1;
      --bg: #0d1117;
      --bg-soft: #161b22;
      --border: #30363d;
      --link: #4493f8;
      --code-bg: #161b22;
      --code-border: #30363d;
      --quote-border: #30363d;
      --user-accent: #4493f8;
      --assistant-accent: #c297ff;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN",
                 "Noto Sans JP", Meiryo, sans-serif;
    color: var(--fg);
    background: var(--bg);
    line-height: 1.7;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
    overflow-wrap: anywhere;
    word-break: normal;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 96px;
  }
  header.page {
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 32px;
  }
  header.page h1 {
    margin: 0 0 8px;
    font-size: 1.75rem;
    line-height: 1.3;
  }
  header.page .meta {
    color: var(--fg-muted);
    font-size: 0.875rem;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  header.page .meta .source {
    padding: 2px 8px;
    background: var(--bg-soft);
    border: 1px solid var(--border);
    border-radius: 999px;
  }
  main h2 {
    margin-top: 2.5em;
    padding-bottom: 0.3em;
    border-bottom: 1px solid var(--border);
    font-size: 1.4rem;
  }
  main h3 { margin-top: 2em; font-size: 1.15rem; }
  main h4 { margin-top: 1.5em; font-size: 1.0rem; }
  main p { margin: 1em 0; }
  main a { color: var(--link); text-decoration: none; }
  main a:hover { text-decoration: underline; }
  main ul, main ol { padding-left: 1.5em; }
  main li { margin: 0.25em 0; }
  main blockquote {
    border-left: 4px solid var(--quote-border);
    margin: 1em 0;
    padding: 0.25em 1em;
    color: var(--fg-muted);
    background: var(--bg-soft);
  }
  main code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
    font-size: 0.9em;
    padding: 0.15em 0.4em;
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 4px;
  }
  main pre {
    background: var(--code-bg);
    border: 1px solid var(--code-border);
    border-radius: 6px;
    padding: 14px 16px;
    overflow-x: auto;
    line-height: 1.5;
  }
  main pre code {
    padding: 0;
    border: 0;
    background: none;
    font-size: 0.875em;
  }
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    margin: 1em 0;
  }
  main table {
    border-collapse: collapse;
    width: 100%;
    margin: 0;
    font-size: 0.95em;
    table-layout: auto;
  }
  main th, main td {
    border: 1px solid var(--border);
    padding: 8px 12px;
    text-align: left;
    word-break: break-word;
    overflow-wrap: anywhere;
  }
  main th { background: var(--bg-soft); }
  main hr { border: 0; border-top: 1px solid var(--border); margin: 2em 0; }

  /* 会話ログ用スタイル */
  .turn {
    margin: 1.5em 0;
    padding: 14px 18px;
    border-left: 4px solid var(--border);
    background: var(--bg-soft);
    border-radius: 0 6px 6px 0;
  }
  .turn.user { border-left-color: var(--user-accent); }
  .turn.assistant { border-left-color: var(--assistant-accent); }
  .turn .role {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--fg-muted);
    margin-bottom: 8px;
  }
  .turn.user .role { color: var(--user-accent); }
  .turn.assistant .role { color: var(--assistant-accent); }
  .turn > :first-child:not(.role) { margin-top: 0; }
  .turn > :last-child { margin-bottom: 0; }

  footer.page {
    margin-top: 64px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    color: var(--fg-muted);
    font-size: 0.8rem;
    text-align: center;
  }
</style>
</head>
<body>
<div class="wrap">
<header class="page">
<h1>{{title}}</h1>
<div class="meta">
<span>{{date}}</span>
<span class="source">{{source_label}}</span>
</div>
</header>
<main>
{{body_html}}
</main>
<footer class="page">Generated by brainstorm-publish skill.</footer>
</div>
</body>
</html>
